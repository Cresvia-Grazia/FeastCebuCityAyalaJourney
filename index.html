<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Feast Ayala Cebu | Socials</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <img src="assets/feast-logo.png" alt="The Feast Logo" class="logo">
            <h1>The Feast Cebu City Ayala</h1>
            
            <div class="info-box">
                <p><strong><i class="fas fa-calendar-day"></i> Every Sunday</strong></p>
                <p>Session 1: 9:00 AM | Session 2: 11:15 AM</p>
                <p><i class="fas fa-map-marker-alt"></i> Ayala Cinema 1, Cebu Business Park</p>
            </div>

            <div id="social-bar" class="social-bar"></div>
        </header>

        <main id="link-list">
            <div class="loader">Loading your home in the city...</div>
        </main>

        <footer>
            <p>Building Lives, Building Communities</p>
            <p>&copy; 2026 FCCA Journey</p>
        </footer>
    </div>

    <script>
        // TAB 1: Action Links (The main buttons)
        const MAIN_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrLk_EoIRtwGWrQOiv253waNRnet6eQldWDLvWkowWWFfRw1J93xA_PuhYqkXq4Si34bseClHGVFNl/pub?gid=0&single=true&output=csv';
        
        // TAB 2: Socials (Starting at J2)
        // IMPORTANT: Update the gid=XXXX below to match your Socials Tab ID
        const SOCIAL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrLk_EoIRtwGWrQOiv253waNRnet6eQldWDLvWkowWWFfRw1J93xA_PuhYqkXq4Si34bseClHGVFNl/pub?gid=INSERT_SOCIAL_GID_HERE&single=true&output=csv';

        async function initPortal() {
            loadSocials();
            loadActionButtons();
        }

        async function loadSocials() {
            const bar = document.getElementById('social-bar');
            try {
                const response = await fetch(SOCIAL_SHEET);
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

                // Mapping for J2 Start: J=9, K=10, L=11
                const idx = { social: 9, icon: 10, handle: 11 };

                rows.slice(1).forEach(cols => {
                    const iconVal = cols[idx.icon]?.replace(/"/g, '').trim().toLowerCase();
                    const handle = cols[idx.handle]?.replace(/"/g, '').trim();

                    if (iconVal && handle) {
                        const iconMap = {
                            'social-fb': { icon: 'fa-facebook', base: 'https://facebook.com/' },
                            'social-ig': { icon: 'fa-instagram', base: 'https://instagram.com/' },
                            'social-yt': { icon: 'fa-youtube', base: 'https://youtube.com/' },
                            'social-tk': { icon: 'fa-tiktok', base: 'https://tiktok.com/@' }
                        };

                        const config = iconMap[iconVal] || { icon: 'fa-link', base: '' };
                        const sLink = document.createElement('a');
                        sLink.href = config.base + handle;
                        sLink.target = '_blank';
                        sLink.className = 'social-icon';
                        sLink.innerHTML = `<i class="fab ${config.icon}"></i>`;
                        bar.appendChild(sLink);
                    }
                });
            } catch (e) { console.error("Socials failed to load."); }
        }

        async function loadActionButtons() {
            const list = document.getElementById('link-list');
            try {
                const response = await fetch(MAIN_SHEET);
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

                // Standard Mapping for Tab 1 (B=1, C=2, D=3, F=5)
                const idx = { order: 1, label: 2, url: 3, active: 5 };

                const dataRows = rows.slice(1)
                    .filter(row => row[idx.label] && row[idx.active]?.toUpperCase().includes('TRUE'))
                    .sort((a, b) => (parseInt(a[idx.order]) || 99) - (parseInt(b[idx.order]) || 99));

                list.innerHTML = '';
                dataRows.forEach(cols => {
                    const card = document.createElement('a');
                    card.href = cols[idx.url].trim();
                    card.className = 'fat-button';
                    card.target = '_blank';
                    card.innerHTML = `<span>${cols[idx.label]}</span>`;
                    list.appendChild(card);
                });
            } catch (e) { list.innerHTML = '<p>Check back later!</p>'; }
        }

        initPortal();
    </script>
</body>
</html>

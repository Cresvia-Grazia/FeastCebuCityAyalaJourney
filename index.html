<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Feast Ayala Cebu | Welcome Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>
<body>

    <div class="container">
        <header>
            <img src="assets/feast-logo.png" alt="The Feast Logo" class="logo">
            <h1>The Feast Cebu City Ayala</h1>
            
            <div class="info-box">
                <p><strong><i class="fas fa-calendar-day"></i> Every Sunday</strong></p>
                <p>Session 1: 9:00 AM (Holy Mass & Talk)</p>
                <p>Session 2: 11:15 AM (Talk Only)</p>
                <p><i class="fas fa-map-marker-alt"></i> Ayala Cinema 1, Cebu Business Park</p>
            </div>
        </header>

        <main id="link-list">
            <div class="loader">Gathering links...</div>
        </main>

        <footer>
            <p>Building Lives, Building Communities</p>
            <p>&copy; 2026 FCCA Journey</p>
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrLk_EoIRtwGWrQOiv253waNRnet6eQldWDLvWkowWWFfRw1J93xA_PuhYqkXq4Si34bseClHGVFNl/pub?gid=0&single=true&output=csv';

        async function loadLinks() {
            const list = document.getElementById('link-list');
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Network error');
                const csvData = await response.text();
                
                // Parse rows and split columns
                const allRows = csvData.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                
                // Identify Headers by keyword (handles bLabel, URLd, etc.)
                const headers = allRows[0].map(h => h.replace(/[^a-zA-Z]/g, '').toLowerCase());
                const findIdx = (term) => headers.findIndex(h => h.includes(term));
                
                const idx = {
                    order:  findIdx('arrangement'),
                    label:  findIdx('label'),
                    url:    findIdx('url'),
                    icon:   findIdx('icon'),
                    active: findIdx('active')
                };

                // Skip header, filter for empty labels, and sort by Arrangement
                const dataRows = allRows.slice(1)
                    .filter(row => row[idx.label] && row[idx.label].trim() !== "")
                    .sort((a, b) => (parseInt(a[idx.order]) || 99) - (parseInt(b[idx.order]) || 99));

                list.innerHTML = '';

                dataRows.forEach(cols => {
                    const activeStatus = cols[idx.active]?.replace(/"/g, '').trim().toUpperCase();

                    if (activeStatus === 'TRUE') {
                        const label = cols[idx.label]?.replace(/"/g, '').trim();
                        const url = cols[idx.url]?.replace(/"/g, '').trim();
                        const icon = cols[idx.icon]?.replace(/"/g, '').trim() || 'link';

                        const card = document.createElement('a');
                        card.href = url;
                        card.className = 'link-card';
                        card.target = '_blank';
                        card.innerHTML = `<i class="fas fa-${icon}"></i> <span>${label}</span>`;
                        
                        card.onclick = () => {
                            if (typeof gtag !== 'undefined') {
                                gtag('event', 'link_click', { 'event_label': label });
                            }
                        };
                        list.appendChild(card);
                    }
                });

                if (list.innerHTML === '') {
                    list.innerHTML = '<p>Check back later for updates!</p>';
                }

            } catch (e) {
                console.error("Fetch failed:", e);
                list.innerHTML = '<p>Welcome Home! Please refresh to load links.</p>';
            }
        }
        loadLinks();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Feast Cebu City Ayala | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <img src="assets/feast-logo.png" alt="The Feast Logo" class="logo">
            <h1>The Feast Cebu City Ayala</h1>
            
            <div class="info-box">
                <p><strong><i class="fas fa-calendar-check"></i> Every Sunday</strong></p>
                <p>Session 1: 9:00 AM | Session 2: 11:15 AM</p>
                <p><i class="fas fa-map-marker-alt"></i> Ayala Cinema 1, Cebu Business Park</p>
            </div>

            <div id="social-bar" class="social-bar"></div>
        </header>

        <main id="link-list">
            <div class="loader">Loading...</div>
        </main>

        <footer>
            <p>Building Lives, Building Communities</p>
            <p>&copy; 2026 FCCA Journey</p>
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQrLk_EoIRtwGWrQOiv253waNRnet6eQldWDLvWkowWWFfRw1J93xA_PuhYqkXq4Si34bseClHGVFNl/pub?gid=0&single=true&output=csv';

        async function loadLinks() {
            const list = document.getElementById('link-list');
            const socialBar = document.getElementById('social-bar');
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

                const idx = { order: 1, label: 2, url: 3, icon: 4, active: 5 };

                const dataRows = rows.slice(1)
                    .filter(row => row[idx.label] && row[idx.label].trim() !== "")
                    .sort((a, b) => (parseInt(a[idx.order]) || 99) - (parseInt(b[idx.order]) || 99));

                list.innerHTML = '';
                socialBar.innerHTML = '';

                dataRows.forEach(cols => {
                    const active = cols[idx.active]?.replace(/"/g, '').trim().toUpperCase();
                    const iconType = cols[idx.icon]?.replace(/"/g, '').trim().toLowerCase();
                    const label = cols[idx.label]?.replace(/"/g, '').trim();
                    const url = cols[idx.url]?.replace(/"/g, '').trim();

                    if (active === 'TRUE') {
                        // IF SOCIAL: Add to top bar
                        if (iconType.startsWith('social-')) {
                            const iconMap = {
                                'social-fb': 'fa-facebook',
                                'social-ig': 'fa-instagram',
                                'social-yt': 'fa-youtube',
                                'social-tk': 'fa-tiktok'
                            };
                            const socialLink = document.createElement('a');
                            socialLink.href = url;
                            socialLink.target = '_blank';
                            socialLink.innerHTML = `<i class="fab ${iconMap[iconType] || 'fa-link'}"></i>`;
                            socialBar.appendChild(socialLink);
                        } 
                        // IF ACTION: Add as a button
                        else {
                            const card = document.createElement('a');
                            card.href = url;
                            card.className = 'link-card';
                            card.target = '_blank';
                            card.innerHTML = `<span>${label}</span>`;
                            list.appendChild(card);
                        }
                    }
                });
            } catch (e) {
                list.innerHTML = '<p>Check back later for updates!</p>';
            }
        }
        loadLinks();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Feast Cebu City | Connect & Grow</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #003366;
            --accent-gold: #D4AF37;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            background-attachment: fixed;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        /* Profile Section */
        .profile {
            margin-bottom: 2rem;
        }

        .logo-placeholder {
            width: 100px;
            height: 100px;
            background: var(--accent-gold);
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--primary-blue);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        p.subtitle { opacity: 0.8; font-size: 0.9rem; margin-bottom: 1.5rem; }

        /* Schedule Card */
        .schedule-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .schedule-card h2 {
            font-size: 1.1rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .session {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        /* Buttons Area */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            border-color: var(--accent-gold);
        }

        .link-btn i {
            width: 30px;
            font-size: 1.2rem;
            margin-right: 15px;
            color: var(--accent-gold);
        }

        /* Social Icons */
        .socials {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-icon {
            color: white;
            font-size: 1.5rem;
            transition: color 0.3s;
        }

        .social-icon:hover {
            color: var(--accent-gold);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <div class="logo-placeholder">
                <i class="fas fa-dove"></i>
            </div>
            <h1>The Feast Cebu City</h1>
            <p class="subtitle">Ayala Cinema 1, Cebu Business Park</p>
        </div>

        <div class="schedule-card">
            <h2>Join Us Every Sunday</h2>
            <div class="session">
                <span><strong>Session 1:</strong> 9:00 AM</span>
                <span>Mass & Talk</span>
            </div>
            <div class="session">
                <span><strong>Session 2:</strong> 11:15 AM</span>
                <span>Talk Only</span>
            </div>
        </div>

        <div class="links-container">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfg_ZT4yl5o5SZNbed-dd4BckYmgwjkxkY595Id3S3PzDotuQ/viewform" class="link-btn" target="_blank">
                <i class="fas fa-hands-helping"></i> Serve with us!
            </a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfg_ZT4yl5o5SZNbed-dd4BckYmgwjkxkY595Id3S3PzDotuQ/viewform" class="link-btn" target="_blank">
                <i class="fas fa-user-plus"></i> First Timer Registration
            </a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfg_ZT4yl5o5SZNbed-dd4BckYmgwjkxkY595Id3S3PzDotuQ/viewform" class="link-btn" target="_blank">
                <i class="fas fa-users"></i> Join a Light Group
            </a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdAp5kVKx-QsoeZbGJs9YpxmGRAsZTDhC-G-7wNwwvInFXv9Q/viewform" class="link-btn" target="_blank">
                <i class="fas fa-church"></i> Mass Intentions
            </a>
            <a href="https://docs.google.com/forms/d/1BBNDFdI2OShn9WJs-E5OAW0mcX5Rr7yYZzJGzxXzyxQ/edit" class="link-btn" target="_blank">
                <i class="fas fa-heart"></i> Prayer Request
            </a>
            <a href="https://cresvia-grazia.github.io/BRS_Ayala/" class="link-btn" target="_blank">
                <i class="fas fa-book-open"></i> Pre-order Your Next Read
            </a>
        </div>

        <div class="socials">
            <a href="https://facebook.com/thefeastcebucity" class="social-icon" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://instagram.com/thefeastcebucity" class="social-icon" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/thefeastcebucity" class="social-icon" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://tiktok.com/@feast.cebu.city" class="social-icon" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>

        <footer>
            You are loved. Welcome home!
        </footer>
    </div>

</body>
</html>
